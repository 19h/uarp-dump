name: ci

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch: {}

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      RUST_BACKTRACE: 1
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --verbose --locked

      - name: Test
        run: cargo test --verbose --locked
